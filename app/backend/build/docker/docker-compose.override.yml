services:
  app:
    image: productzilla/${APP_NAME}:local
    build:
      context: ../../
      dockerfile: build/docker/dockerfile
      target: base
    working_dir: /app/backend
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      - db
      - pgadmin
    volumes:
      - ../../:/app/backend
    command: bash -c "yarn start:dev"
    networks:
      default:
