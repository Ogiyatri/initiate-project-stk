services:
  frontend:
    image: malakiano/stk-frontend:latest
    build:
      context: ../../
      dockerfile: build/docker/dockerfile
    env_file:
      - ./.env
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
    networks:
      default:
